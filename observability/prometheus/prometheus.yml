global:
  scrape_interval: 15s

rule_files:
  - /etc/prometheus/alerts.yml

scrape_configs:
  - job_name: api
    static_configs:
      - targets: ["api:8080"]
  - job_name: auth-service
    static_configs:
      - targets: ["auth-service:8081"]
  - job_name: stream-service
    static_configs:
      - targets: ["stream-service:8082"]
  - job_name: chat-service
    static_configs:
      - targets: ["chat-service:8083"]
