events {
  worker_connections 1024;
}

http {
  include /etc/nginx/cloudflare-real-ip.conf;

  # Re-resolve Docker service names when containers are recreated.
  resolver 127.0.0.11 valid=10s ipv6=off;

  map $http_x_forwarded_proto $proxy_forwarded_proto {
    default $http_x_forwarded_proto;
    ""      $scheme;
  }

  server {
    listen 80;
    return 301 https://$host$request_uri;
  }

  server {
    listen 443 ssl;
    ssl_certificate /etc/nginx/certs/fullchain.pem;
    ssl_certificate_key /etc/nginx/certs/privkey.pem;
    client_max_body_size 50m;
    proxy_read_timeout 3600s;
    proxy_send_timeout 3600s;

    location /auth/ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream/auth/;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    location /streams {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      proxy_buffering off;
    }

    location /public/ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
    }

    location /hls/ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      proxy_buffering off;
    }

    location /whip/ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "POST, PATCH, OPTIONS, DELETE" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Expose-Headers "Location, Link" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    location /whep/ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      add_header Access-Control-Allow-Origin * always;
      add_header Access-Control-Allow-Methods "POST, PATCH, OPTIONS, DELETE" always;
      add_header Access-Control-Allow-Headers "Content-Type, Authorization" always;
      add_header Access-Control-Expose-Headers "Location, Link" always;
      if ($request_method = OPTIONS) {
        return 204;
      }
    }

    location /ws/ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_http_version 1.1;
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      proxy_set_header Host $host;
      proxy_buffering off;
    }

    location ~ ^/(livez|readyz|metrics)$ {
      set $api_upstream api:8080;
      proxy_pass http://$api_upstream;
      proxy_set_header Host $host;
    }

    location /assets/ {
      set $minio_upstream minio:9000;
      proxy_pass http://$minio_upstream/live-demo-media-artifacts/;
      proxy_set_header Host $host;
    }

    location / {
      set $frontend_upstream frontend:3000;
      proxy_pass http://$frontend_upstream;
      proxy_set_header Host $host;
      proxy_set_header X-Real-IP $remote_addr;
      proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header X-Forwarded-Proto $proxy_forwarded_proto;
      add_header Permissions-Policy "camera=(self), microphone=(self), display-capture=(self)" always;
    }
  }
}
