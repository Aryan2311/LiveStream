apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: live-observability
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/live-streaming-platform.git
    targetRevision: main
    path: observability
  destination:
    server: https://kubernetes.default.svc
    namespace: observability
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
