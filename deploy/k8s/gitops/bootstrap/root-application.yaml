apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: live-platform-root
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/example/live-streaming-platform.git
    targetRevision: main
    path: deploy/k8s/gitops/apps
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
