apiVersion: v1
kind: ConfigMap
metadata:
  name: platform-config
data:
  APP_ENV: production
  LOG_LEVEL: info
  AUTH_SERVICE_URL: http://auth-service:8081
  STREAM_SERVICE_URL: http://stream-service:8082
  CHAT_SERVICE_URL: http://chat-service:8083
  FRONTEND_URL: http://frontend:3000
  API_PROXY_TARGET: http://api:8080
  OTEL_EXPORTER_OTLP_ENDPOINT: otel-collector:4318
  PUBLIC_BASE_URL: https://stream.example.com
  RTMP_BASE_URL: rtmp://mediamtx:1935
  HLS_BASE_URL: http://mediamtx:8888/live
  WHIP_BASE_URL: http://mediamtx:8889
  MEDIAMTX_API_URL: http://mediamtx:9997
  STREAM_APP_NAME: live
  STREAM_PUBLISH_TTL: 24h
  REDIS_ADDR: redis:6379
  NATS_URL: nats://nats:4222
  POSTGRES_DSN: postgres://postgres:postgres@postgres:5432/live?sslmode=disable
---
apiVersion: v1
kind: Secret
metadata:
  name: platform-secrets
type: Opaque
stringData:
  JWT_SECRET: change-me
  INTERNAL_SERVICE_TOKEN: internal-change-me
  PLAYBACK_SIGNING_KEY: playback-change-me
  INGEST_SIGNING_KEY: ingest-change-me
