apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: live-platform
  annotations:
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "3600"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "3600"
spec:
  ingressClassName: nginx
  rules:
    - http:
        paths:
          - path: /auth/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /streams
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /public/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /hls/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /whip/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /whep/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /ws/
            pathType: Prefix
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /livez
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /readyz
            pathType: Exact
            backend:
              service:
                name: api
                port:
                  number: 8080
          - path: /
            pathType: Prefix
            backend:
              service:
                name: frontend
                port:
                  number: 3000
