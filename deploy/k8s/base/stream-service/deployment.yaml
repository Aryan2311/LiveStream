apiVersion: apps/v1
kind: Deployment
metadata:
  name: stream-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: stream-service
  template:
    metadata:
      labels:
        app: stream-service
    spec:
      containers:
        - name: stream-service
          image: live-streaming-platform/stream-service:latest
          ports:
            - containerPort: 8082
          envFrom:
            - configMapRef:
                name: platform-config
            - secretRef:
                name: platform-secrets
          env:
            - name: HTTP_PORT
              value: "8082"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8082
          livenessProbe:
            httpGet:
              path: /livez
              port: 8082
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: stream-service
spec:
  selector:
    app: stream-service
  ports:
    - name: http
      port: 8082
      targetPort: 8082
